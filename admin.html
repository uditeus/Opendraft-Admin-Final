<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Opendraft</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
        rel="stylesheet" />
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('lovable-chat-theme');
                var supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches === true;

                // Se o tema for 'dark' OU se não houver tema salvo (primeiro acesso)
                // Vamos forçar o dark como padrão inicial do Console como solicitado
                if (theme === 'dark' || !theme || (theme === 'system' && supportDarkMode)) {
                    document.documentElement.classList.add('dark');
                    document.documentElement.style.colorScheme = 'dark';
                } else {
                    document.documentElement.classList.remove('dark');
                    document.documentElement.style.colorScheme = 'light';
                }
            } catch (e) { }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/admin/main.tsx"></script>
</body>

</html>
